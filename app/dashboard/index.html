<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SubMate Dashboard</title>

    <!-- Bootstrap (active for plumbing) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Tailwind (commented out for later) -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->

    <style>
        body {
            background: #111;
            color: #eee;
            padding: 20px;
        }

        #log {
            white-space: pre-wrap;
            background: #222;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            max-height: 40vh;
            overflow-y: auto;
        }

        .panel {
            background: #1a1a1a;
            border-radius: 6px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div class="container-fluid">

        <h1 class="mb-4">SubMate Dashboard</h1>

        <!-- Row 1: Live Event Stream -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card bg-dark text-light">
                    <div class="card-header">
                        WebSocket Event Stream
                    </div>
                    <div class="card-body">
                        <div id="log">Connecting...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Row 2: Three-Panel Grid -->
        <div class="row g-4">

            <div class="col-md-4">
                <div class="panel">
                    <h4>Job Queue</h4>
                    <div id="jobs">No data yet...</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="panel">
                    <h4>Pairings</h4>
                    <div id="pairings">No data yet...</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="panel">
                    <h4>Hash Audits</h4>
                    <div id="audits">No data yet...</div>
                </div>
            </div>

        </div>

    </div>

    <script>
        const log = document.getElementById("log");
        const ws = new WebSocket("ws://localhost:9090/ws/events");

        ws.onopen = () => {
            log.textContent = "Connected to SubMate WebSocket\n";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            log.textContent += JSON.stringify(data, null, 2) + "\n\n";
            log.scrollTop = log.scrollHeight;
        };

        ws.onerror = (err) => {
            log.textContent += "WebSocket error: " + err + "\n";
        };
    </script>

</body>

</html>
